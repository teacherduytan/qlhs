name: Supabase Keepalive

on:
  schedule:
    - cron: '17 2 */4 * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase project
        env:
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_URL: https://zupkcgfjkckrbemptaiv.supabase.co
        run: |
          if [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::warning::Missing SUPABASE_ANON_KEY secret; skip Supabase keepalive ping."
            exit 0
          fi

          curl --silent --show-error --location \
            --header "apikey: $SUPABASE_ANON_KEY" \
            --header "Authorization: Bearer $SUPABASE_ANON_KEY" \
            "$SUPABASE_URL/rest/v1/cau_hinh_tuan?select=tuan_so&limit=1" \
            || true
